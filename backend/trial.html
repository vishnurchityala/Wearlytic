<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supabase Google OAuth Test</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Supabase Google OAuth Test</h2>

<button id="loginBtn">Login with Google</button>
<button id="logoutBtn">Logout</button>

<pre id="output">Not logged in</pre>

<script>
    const SUPABASE_URL = "https://knrbxuzorgcjgfmtkias.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtucmJ4dXpvcmdjamdmbXRraWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NDk2MTUsImV4cCI6MjA4MzAyNTYxNX0.M_5JGi8mgZ8VEqb5NiiroJ4m3SuBI6Fh-wKalOz_o7E";

    // IMPORTANT: declare ONCE only
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const output = document.getElementById("output");

    loginBtn.addEventListener("click", async () => {
        const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: "google",
            options: {
                redirectTo: window.location.href
            }
        });

        if (error) {
            output.textContent = "Login error: " + error.message;
        }
    });

    logoutBtn.addEventListener("click", async () => {
        await supabaseClient.auth.signOut();
        output.textContent = "Logged out";
    });

    async function loadUser() {
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        if (error) {
            output.textContent = "Session error: " + error.message;
            return;
        }

        if (!session) {
            output.textContent = "Not logged in";
            return;
        }

        const user = session.user;

        output.textContent = JSON.stringify({
            user_id: user.id,
            email: user.email,
            provider: user.app_metadata.provider,
            full_name: user.user_metadata.full_name,
            access_token: session.access_token
        }, null, 2);
    }

    loadUser();
</script>

</body>
</html>
