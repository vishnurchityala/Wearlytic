services:
  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile.dev
    env_file:
      - ./web-app/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./web-app:/app
      - web_app_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    environment:
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend,.vercel.app,.onrender.com,16.171.17.49
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  scraping-agent:
    platform: linux/amd64
    build:
      context: ./scraping-agent
      dockerfile: Dockerfile.dev
    env_file:
      - ./scraping-agent/.env
    environment:
      PLATFORM: linux64
      PORT: "8080"
      REDIS_URL: redis://127.0.0.1:6379/0
      SELENIUM_REMOTE_DEBUGGER_ADDRESS: host.docker.internal:9222
    ports:
      - "8080:8080"
    shm_size: 1gb
    volumes:
      - ./scraping-agent:/app

  data-ingestor:
    build:
      context: ./data-ingestor
      dockerfile: Dockerfile.dev
    env_file:
      - ./data-ingestor/.env
    environment:
      PORT: "8081"
      REDIS_URL: redis://127.0.0.1:6379/0
      SCRAPING_AGENT_API_URL: http://scraping-agent:8080/api/scrapingagent
    ports:
      - "8081:8081"
    volumes:
      - ./data-ingestor:/app
    depends_on:
      - scraping-agent

volumes:
  web_app_node_modules:
